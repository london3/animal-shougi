<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe29a" />
      <stop offset="100%" stop-color="#ffaf7b" />
    </linearGradient>
    <style>
      .title { font-family: 'Noto Sans JP', 'Helvetica Neue', Arial, sans-serif; font-size: 72px; fill: #3a2a14; font-weight: 700; }
      .subtitle { font-family: 'Noto Sans JP', 'Helvetica Neue', Arial, sans-serif; font-size: 32px; fill: #4a3a22; }
      .piece { font-size: 96px; }
      .label { font-family: 'Noto Sans JP', 'Helvetica Neue', Arial, sans-serif; font-size: 28px; fill: #3a2a14; }
      .square { fill: rgba(255,255,255,0.75); stroke: #8c6a3c; stroke-width: 4px; }
    </style>
  </defs>
  <rect width="1200" height="630" rx="40" ry="40" fill="url(#bg)" />
  <rect x="60" y="120" width="1080" height="340" rx="30" ry="30" fill="rgba(255,255,255,0.9)" />
  <text x="80" y="90" class="title">動物将棋</text>
  <text x="80" y="170" class="subtitle">かわいい駒で遊べるWebゲーム</text>
  <g transform="translate(140,240)">
    <rect class="square" x="0" y="0" width="160" height="160" rx="24" ry="24" />
    <rect class="square" x="170" y="0" width="160" height="160" rx="24" ry="24" />
    <rect class="square" x="340" y="0" width="160" height="160" rx="24" ry="24" />
    <rect class="square" x="85" y="170" width="160" height="160" rx="24" ry="24" />
    <text x="50" y="110" class="piece">🐘</text>
    <text x="220" y="110" class="piece">🦁</text>
    <text x="390" y="110" class="piece">🦒</text>
    <text x="255" y="280" class="piece">🐥</text>
  </g>
  <text x="80" y="520" class="label">Vercelで公開中</text>
  <text x="80" y="560" class="label">https://animal-shougi.vercel.app/</text>
</svg>
