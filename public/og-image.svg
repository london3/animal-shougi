<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffebbb" />
      <stop offset="100%" stop-color="#ffd2a6" />
    </linearGradient>
    <style>
      .title { font-family: 'Noto Sans JP', 'Helvetica Neue', Arial, sans-serif; font-size: 80px; fill: #3c2915; font-weight: 800; }
      .subtitle { font-family: 'Noto Sans JP', 'Helvetica Neue', Arial, sans-serif; font-size: 34px; fill: #4a3a22; }
      .label { font-family: 'Noto Sans JP', 'Helvetica Neue', Arial, sans-serif; font-size: 28px; fill: #3a2a14; }
      .square { fill: rgba(255,255,255,0.95); stroke: #8c6a3c; stroke-width: 5px; }
      .piece { font-size: 92px; text-anchor: middle; dominant-baseline: middle; }
      .board-label { font-family: 'Noto Sans JP', 'Helvetica Neue', Arial, sans-serif; font-size: 32px; fill: #3a2a14; }
    </style>
  </defs>
  <rect width="1200" height="630" rx="40" ry="40" fill="url(#bg)" />
  <rect x="60" y="80" width="1080" height="470" rx="36" ry="36" fill="rgba(255,255,255,0.94)" />

  <text x="100" y="140" class="title">動物将棋</text>
  <text x="100" y="190" class="subtitle">かわいい駒で楽しむミニ将棋</text>

  <g transform="translate(240, 230)">
    <rect class="square" x="0" y="0" width="180" height="180" rx="26" ry="26" />
    <rect class="square" x="200" y="0" width="180" height="180" rx="26" ry="26" />
    <rect class="square" x="400" y="0" width="180" height="180" rx="26" ry="26" />
    <rect class="square" x="100" y="200" width="180" height="180" rx="26" ry="26" />

    <text x="90" y="90" class="piece">🐘</text>
    <text x="290" y="90" class="piece">🦁</text>
    <text x="490" y="90" class="piece">🦒</text>
    <text x="290" y="290" class="piece">🐥</text>
  </g>

  <text x="100" y="520" class="label">Vercel公開中</text>
  <text x="100" y="560" class="label">https://animal-shougi.vercel.app/</text>
</svg>
